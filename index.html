<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comedy Hours Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f5f5f7;
      --surface:    #ffffff;
      --text:       #1d1d1f;
      --text-2:     #6e6e73;
      --text-3:     #aeaeb2;
      --border:     #d2d2d7;
      --accent:     #0071e3;
      --accent-bg:  rgba(0, 113, 227, 0.08);
      --hover-bg:   #f0f0f5;
      --radius:     12px;
    }

    body {
      background-color: var(--bg);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      color: var(--text);
      padding: 64px 40px 100px;
    }

    .page { max-width: 1000px; margin: 0 auto; }

    /* ─── MASTHEAD ─── */

    .masthead {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding-bottom: 36px;
    }

    .title-block h1 {
      font-size: clamp(22px, 3vw, 30px);
      font-weight: 700;
      letter-spacing: -0.025em;
      line-height: 1.1;
      color: var(--text);
    }

    .title-block .byline {
      font-size: 14px;
      font-weight: 400;
      font-style: normal;
      font-family: inherit;
      color: var(--text-2);
      margin-top: 5px;
    }

    .user-label {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 5px;
      min-height: 14px;
    }

    .switch-btn {
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      font: inherit;
      font-size: 11px;
      padding: 0;
    }

    .switch-btn:hover { text-decoration: underline; }

    .monthly-badge {
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 28px;
      text-align: center;
      line-height: 1.5;
    }

    .monthly-badge .big-num {
      display: block;
      font-size: 40px;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--accent);
      line-height: 1.05;
    }

    /* ─── NAV ROW ─── */

    .nav-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding-bottom: 24px;
    }

    .nav-btn {
      background: none;
      border: none;
      -webkit-appearance: none;
      font-family: inherit;
      font-size: 26px;
      font-weight: 300;
      line-height: 1;
      cursor: pointer;
      padding: 6px 12px;
      color: var(--text);
      border-radius: 8px;
      transition: background 0.15s, transform 0.1s;
    }

    .nav-btn:hover {
      background: rgba(0, 0, 0, 0.06);
      transform: scale(1.12);
    }

    .month-label {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.025em;
      min-width: 280px;
      text-align: center;
      color: var(--text);
    }

    /* ─── CALENDAR ─── */

    .calendar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.05);
    }

    .col-headers {
      display: grid;
      grid-template-columns: repeat(7, 1fr) 72px;
      border-bottom: 1px solid var(--border);
    }

    .col-header {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-align: center;
      padding: 14px 4px;
      text-transform: uppercase;
      color: var(--text-2);
      font-family: inherit;
    }

    .col-header:nth-child(6),
    .col-header:nth-child(7) { color: var(--text-3); }

    .col-header:last-child { font-size: 0; color: transparent; }

    .week-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr) 72px;
      border-bottom: 1px solid var(--border);
      min-height: 104px;
    }

    .week-row:last-child { border-bottom: none; }

    /* ─── DAY CELLS ─── */

    .day-cell {
      padding: 10px;
      cursor: pointer;
      position: relative;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      touch-action: manipulation;
      overflow: hidden;
      border-radius: 10px;
      transition: background 0.15s, box-shadow 0.15s;
    }

    .day-cell.empty  { cursor: default; background: none; border-radius: 0; }
    .day-cell.today  { background-color: var(--accent-bg); }

    .day-cell:not(.empty):hover {
      background-color: var(--hover-bg);
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .day-cell.today:not(.empty):hover { background-color: rgba(0,113,227,.13); }

    .day-num {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      position: absolute;
      top: 10px;
      right: 10px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .day-cell.today .day-num {
      background: var(--accent);
      color: #fff;
      border-radius: 50%;
      font-weight: 600;
      font-size: 12px;
    }

    /* ─── X MARKS ─── */

    .x-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 36px 32px 8px 10px;
      align-content: flex-start;
    }

    .x-mark {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      display: inline-block;
      flex-shrink: 0;
      user-select: none;
    }

    .x-mark.stamp-in {
      animation: xIn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes xIn {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.25); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ─── WEEK ANNOTATION ─── */

    .week-annot {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 0 14px 14px 4px;
      gap: 3px;
    }

    .annot-slash { display: none; }

    .annot-num {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-2);
      line-height: 1;
    }

    .annot-unit {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-2);
      text-transform: lowercase;
    }

    /* ─── FOOTER ─── */

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-3);
      text-align: center;
    }

    /* ─── SYNC STATUS ─── */

    .sync-status {
      position: fixed;
      top: 18px;
      right: 22px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-3);
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
      z-index: 200;
    }

    .sync-status.visible { opacity: 1; }

    /* ─── USERNAME MODAL ─── */

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .modal-card {
      background: var(--surface);
      border-radius: 20px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,.12), 0 32px 80px rgba(0,0,0,.14);
      transform: scale(0.95) translateY(10px);
      transition: transform 0.25s cubic-bezier(0.34, 1.4, 0.64, 1);
    }

    .modal-overlay.visible .modal-card {
      transform: scale(1) translateY(0);
    }

    .modal-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 8px;
    }

    .modal-sub {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.55;
      margin-bottom: 28px;
    }

    .modal-input {
      display: block;
      width: 100%;
      font-family: inherit;
      font-size: 17px;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      outline: none;
      margin-bottom: 14px;
      -webkit-appearance: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .modal-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,113,227,.18);
    }

    .modal-input::placeholder { color: var(--text-3); }

    .modal-btn {
      display: block;
      width: 100%;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 980px;
      padding: 15px 24px;
      cursor: pointer;
      -webkit-appearance: none;
      transition: opacity 0.15s, transform 0.1s;
    }

    .modal-btn:hover  { opacity: 0.88; }
    .modal-btn:active { transform: scale(0.98); }
    .modal-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ─── MOBILE (≤ 767px) ─── */

    @media (max-width: 767px) {
      body { padding: 28px 12px 60px; }

      .masthead {
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
        padding-bottom: 24px;
      }

      .title-block h1 { font-size: 22px; }
      .title-block .byline { font-size: 13px; }

      .monthly-badge { padding: 12px 20px; text-align: center; }
      .monthly-badge .big-num { font-size: 28px; }

      .nav-row { justify-content: space-between; padding-bottom: 20px; gap: 0; }

      .nav-btn {
        min-width: 44px;
        min-height: 44px;
        font-size: 30px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .month-label { font-size: 22px; min-width: 0; flex: 1; letter-spacing: -0.01em; }

      .col-headers { grid-template-columns: repeat(7, 1fr); }
      .col-header  { font-size: 9px; padding: 10px 2px; letter-spacing: 0.04em; }
      .col-header:last-child { display: none; }

      .week-row    { grid-template-columns: repeat(7, 1fr); min-height: 60px; }
      .week-annot  { display: none; }

      .day-cell  { padding: 4px; border-radius: 6px; }
      .day-num   { font-size: 10px; width: 18px; height: 18px; top: 3px; right: 3px; }
      .day-cell.today .day-num { font-size: 9px; }

      .x-wrap  { padding: 22px 4px 3px 3px; gap: 2px 3px; }
      .x-mark  { font-size: 11px; }
      .footer  { font-size: 11px; }

      .sync-status { top: 10px; right: 14px; }
      .modal-card  { padding: 36px 28px 32px; }
      .modal-title { font-size: 22px; }
    }
  </style>
</head>
<body>

<!-- ─── USERNAME MODAL ─── -->
<div id="modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal-card">
    <h2 class="modal-title" id="modalTitle">What's your name?</h2>
    <p class="modal-sub">We'll use it to sync your writing hours across devices.</p>
    <input
      type="text" id="nameInput" class="modal-input"
      placeholder="Your name"
      autocomplete="off" autocorrect="off" spellcheck="false" maxlength="40"
    >
    <button id="confirmBtn" class="modal-btn" disabled>Continue</button>
  </div>
</div>

<!-- ─── SYNC STATUS (fixed top-right) ─── -->
<div id="syncStatus" class="sync-status" role="status" aria-live="polite"></div>

<div class="page">

  <div class="masthead">
    <div class="title-block">
      <h1>Comedy Hours Tracker</h1>
      <p class="byline">Track the hours you spend writing comedy — one ✕ per hour.</p>
      <p class="user-label" id="userLabel"></p>
    </div>
    <div class="monthly-badge">
      This month<br>
      <span class="big-num" id="totalNum">0</span>
      hrs written
    </div>
  </div>

  <div class="nav-row">
    <button class="nav-btn" id="prevBtn">&#8249;</button>
    <span class="month-label" id="monthLabel"></span>
    <button class="nav-btn" id="nextBtn">&#8250;</button>
  </div>

  <div class="calendar" id="calendar">
    <div class="col-headers">
      <div class="col-header">Mon</div>
      <div class="col-header">Tue</div>
      <div class="col-header">Wed</div>
      <div class="col-header">Thu</div>
      <div class="col-header">Fri</div>
      <div class="col-header">Sat</div>
      <div class="col-header">Sun</div>
      <div class="col-header">// wk</div>
    </div>
    <div id="calBody"></div>
  </div>

  <p class="footer">
    Click to add &nbsp;&middot;&nbsp;
    Right-click or long-press to remove &nbsp;&middot;&nbsp;
    Data saved automatically
  </p>

</div>

<script>
  // ─────────────────────────────────────────────────────────────────────────────
  //  CLOUD SYNC SETUP  (JSONBin.io — free tier, ~10 k requests/month)
  //
  //  1. Create a free account at https://jsonbin.io
  //  2. Go to  Account → Master Key  and copy your  $2b$…  key
  //  3. Click  Bins → Create Bin → enter content {}  → Create
  //     Copy the bin ID that appears (e.g. 6831abc…).
  //     This "registry" bin maps each username to their own data bin.
  //  4. Paste both values into the two constants below and save.
  //
  //  Leave both empty ('') to run in local-only mode (no cross-device sync).
  // ─────────────────────────────────────────────────────────────────────────────
  const API_KEY         = '';   // e.g. '$2b$10$xyz...'
  const REGISTRY_BIN_ID = '';   // e.g. '6831abc123...'
  // ─────────────────────────────────────────────────────────────────────────────

  const BASE         = 'https://api.jsonbin.io/v3';
  const STORAGE_KEY  = 'comedy-tracker-data';
  const USERNAME_KEY = 'comedy-tracker-username';
  const BINID_PFX    = 'comedy-tracker-binid-';

  let data            = {};
  let yr, mo;
  let username        = null;
  let currentBinId    = null;
  let longPressTimer  = null;
  let longPressFired  = false;
  let saveDebounce    = null;
  let statusHideTimer = null;

  /* ── Cloud availability ── */

  function cloudOn() {
    return API_KEY !== '' && REGISTRY_BIN_ID !== '';
  }

  /* ── Sync status ── */

  function showStatus(state) {
    const el = document.getElementById('syncStatus');
    if (!el || !cloudOn()) return;
    clearTimeout(statusHideTimer);
    el.classList.add('visible');
    if (state === 'saving') {
      el.textContent = 'Saving…';
    } else if (state === 'saved') {
      el.textContent = 'Saved ✓';
      statusHideTimer = setTimeout(() => el.classList.remove('visible'), 2500);
    } else if (state === 'offline') {
      el.textContent = 'Offline — saved locally';
      statusHideTimer = setTimeout(() => el.classList.remove('visible'), 4000);
    } else {
      el.classList.remove('visible');
    }
  }

  /* ── JSONBin fetch wrapper ── */

  async function apiFetch(path, opts = {}) {
    const method = (opts.method || 'GET').toUpperCase();

    // Only send Content-Type on requests that carry a body
    const headers = { 'X-Master-Key': API_KEY, ...(opts.headers || {}) };
    if (method === 'POST' || method === 'PUT') {
      headers['Content-Type'] = 'application/json';
    }

    const res = await fetch(`${BASE}${path}`, { ...opts, headers });

    if (!res.ok) {
      let body = '';
      try { body = await res.text(); } catch {}
      const msg = `JSONBin ${res.status} ${res.statusText} [${method} ${path}] — ${body}`;
      console.error('[Comedy Tracker]', msg);
      throw new Error(msg);
    }

    return res.json();
  }

  async function readBin(id) {
    const j = await apiFetch(`/b/${id}/latest`);
    return j.record;
  }

  async function writeBin(id, payload) {
    await apiFetch(`/b/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
  }

  async function createBin(name, payload) {
    const j = await apiFetch('/b', {
      method: 'POST',
      headers: { 'X-Bin-Name': name, 'X-Bin-Private': 'true' },
      body: JSON.stringify(payload)
    });
    const id = j.metadata?.id;
    if (!id) {
      const msg = `createBin: no ID in response — ${JSON.stringify(j)}`;
      console.error('[Comedy Tracker]', msg);
      throw new Error(msg);
    }
    console.log(`[Comedy Tracker] Created bin "${name}": ${id}`);
    return id;
  }

  /* ── Registry: username → data-bin-ID map ── */

  async function readRegistry() {
    const raw = await readBin(REGISTRY_BIN_ID);
    return (raw && typeof raw === 'object') ? raw : {};
  }

  async function addToRegistry(name, binId) {
    let reg = {};
    try {
      reg = await readRegistry();
    } catch (err) {
      console.error('[Comedy Tracker] addToRegistry: could not read registry (will still try to write):', err);
    }
    reg[name] = binId;
    await writeBin(REGISTRY_BIN_ID, reg);   // throws if write fails — let caller handle it
    console.log(`[Comedy Tracker] Registry updated: "${name}" → ${binId}`);
  }

  /* ── localStorage ── */

  function localKey() {
    return username ? `${STORAGE_KEY}-${username}` : STORAGE_KEY;
  }

  function loadLocal() {
    try { data = JSON.parse(localStorage.getItem(localKey())) || {}; }
    catch { data = {}; }
  }

  function saveLocal() {
    try { localStorage.setItem(localKey(), JSON.stringify(data)); } catch {}
  }

  /* ── save: immediate local + debounced cloud ── */

  function save() {
    saveLocal();
    if (!currentBinId) return;
    clearTimeout(saveDebounce);
    showStatus('saving');
    saveDebounce = setTimeout(async () => {
      try {
        await writeBin(currentBinId, data);
        showStatus('saved');
      } catch (err) {
        console.error('[Comedy Tracker] Cloud save failed:', err);
        showStatus('offline');
      }
    }, 800);
  }

  /* ── User session ── */

  function setUserLabel(name) {
    const el = document.getElementById('userLabel');
    if (!el) return;
    el.textContent = `Signed in as ${name} · `;
    const btn = document.createElement('button');
    btn.className = 'switch-btn';
    btn.textContent = 'Switch';
    btn.addEventListener('click', () => {
      localStorage.removeItem(USERNAME_KEY);
      username = null;
      currentBinId = null;
      data = {};
      render();
      showModal();
    });
    el.appendChild(btn);
  }

  async function initUser(rawName) {
    // Normalise: lowercase + trim so "Juan" and "juan" resolve to the same bin
    username = rawName.trim().toLowerCase();
    localStorage.setItem(USERNAME_KEY, username);
    setUserLabel(username);

    if (!cloudOn()) {
      loadLocal();
      render();
      return;
    }

    showStatus('saving');
    console.log(`[Comedy Tracker] Initialising user: "${username}"`);

    try {
      // Fast path: bin ID cached from a previous session on this device
      let binId = localStorage.getItem(BINID_PFX + username);
      console.log(`[Comedy Tracker] Cached bin ID: ${binId || 'none'}`);

      if (!binId) {
        // Slow path: ask the index bin who this username belongs to
        console.log('[Comedy Tracker] Querying index bin…');
        const reg = await readRegistry();
        console.log('[Comedy Tracker] Index bin contents:', JSON.stringify(reg));

        if (reg[username]) {
          binId = reg[username];
          console.log(`[Comedy Tracker] Found existing bin for "${username}": ${binId}`);
          localStorage.setItem(BINID_PFX + username, binId);
        } else {
          // First time this username has ever logged in — mint a new data bin
          console.log(`[Comedy Tracker] New user "${username}" — creating data bin…`);
          binId = await createBin(`comedy-tracker-${username}`, {});
          localStorage.setItem(BINID_PFX + username, binId);
          // Register so other devices can find it
          try {
            await addToRegistry(username, binId);
          } catch (regErr) {
            console.error('[Comedy Tracker] Index bin write failed (data bin created, but not registered):', regErr);
            // Non-fatal: this device works fine; new devices won't find this user until
            // the registry is writable again and a save goes through.
          }
        }
      }

      currentBinId = binId;
      console.log(`[Comedy Tracker] Active bin: ${binId}`);

      // Load cloud data into the calendar
      let cloud = null;
      try {
        cloud = await readBin(binId);
        console.log(`[Comedy Tracker] Cloud data: ${Object.keys(cloud || {}).length} date entries`);
      } catch (readErr) {
        console.error('[Comedy Tracker] Could not read data bin — falling back to localStorage:', readErr);
      }

      if (cloud && typeof cloud === 'object' && Object.keys(cloud).length > 0) {
        data = cloud;
        saveLocal(); // keep local in sync with cloud
      } else {
        loadLocal(); // might have prior local data worth showing
      }

      showStatus('idle');
    } catch (err) {
      console.error('[Comedy Tracker] initUser failed — running in local-only mode:', err);
      loadLocal();
      showStatus('offline');
    }

    render();
  }

  /* ── Modal ── */

  function showModal() {
    const modal = document.getElementById('modal');
    const input = document.getElementById('nameInput');
    input.value = '';
    document.getElementById('confirmBtn').disabled = true;
    modal.classList.add('visible');
    requestAnimationFrame(() => input.focus());
  }

  function hideModal() {
    document.getElementById('modal').classList.remove('visible');
  }

  function confirmName() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) return;
    hideModal();
    initUser(name); // initUser normalises to lowercase internally
  }

  /* ── Calendar helpers ── */

  function dateKey(y, m, d) {
    return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
  }

  function hrs(dk) { return data[dk] || 0; }

  function rot(dk, i) {
    let h = 0;
    const s = dk + '|' + i;
    for (let j = 0; j < s.length; j++) h = Math.imul(31, h) + s.charCodeAt(j) | 0;
    return (Math.abs(h) % 9) - 4;
  }

  function buildXMarks(dk, animateLast = false) {
    const n = hrs(dk);
    let out = '';
    for (let i = 0; i < n; i++) {
      const anim = animateLast && i === n - 1 ? ' stamp-in' : '';
      out += `<span class="x-mark${anim}">✕</span>`;
    }
    return out;
  }

  /* ── Cell event binding ── */

  function bindCell(cell) {
    cell.addEventListener('click', function(e) {
      if (longPressFired) { longPressFired = false; return; }
      onAdd.call(this, e);
    });

    cell.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      if (longPressFired) return;
      onRemove.call(this, e);
    });

    cell.addEventListener('touchstart', function() {
      const self = this;
      longPressFired = false;
      clearTimeout(longPressTimer);
      longPressTimer = setTimeout(function() {
        longPressFired = true;
        onRemove.call(self, { preventDefault: function() {} });
      }, 500);
    }, { passive: true });

    cell.addEventListener('touchend',  function() { clearTimeout(longPressTimer); });
    cell.addEventListener('touchmove', function() { clearTimeout(longPressTimer); });
  }

  /* ── Render ── */

  function render() {
    const MONTHS = ['January','February','March','April','May','June',
                    'July','August','September','October','November','December'];

    document.getElementById('monthLabel').textContent = `${MONTHS[mo]} ${yr}`;

    const today    = new Date();
    const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());
    const firstDay = new Date(yr, mo, 1);
    const daysInMonth = new Date(yr, mo + 1, 0).getDate();

    let offset = firstDay.getDay() - 1;
    if (offset < 0) offset = 6;

    const numWeeks = Math.ceil((offset + daysInMonth) / 7);
    let monthTotal = 0;
    let html = '';

    for (let w = 0; w < numWeeks; w++) {
      let weekTotal = 0;
      let cells = '';

      for (let dow = 0; dow < 7; dow++) {
        const idx = w * 7 + dow;
        const day = idx - offset + 1;

        if (day < 1 || day > daysInMonth) {
          cells += `<div class="day-cell empty"></div>`;
        } else {
          const dk      = dateKey(yr, mo, day);
          const isToday = dk === todayKey;
          weekTotal  += hrs(dk);
          monthTotal += hrs(dk);

          cells += `
            <div class="day-cell${isToday ? ' today' : ''}" data-dk="${dk}">
              <span class="day-num">${day}</span>
              <div class="x-wrap">${buildXMarks(dk)}</div>
            </div>`;
        }
      }

      cells += `
        <div class="week-annot">
          <span class="annot-slash">//</span>
          <span class="annot-num" id="wt${w}">${weekTotal}</span>
          <span class="annot-unit">hrs</span>
        </div>`;

      html += `<div class="week-row">${cells}</div>`;
    }

    document.getElementById('calBody').innerHTML = html;
    document.getElementById('totalNum').textContent = monthTotal;
    document.querySelectorAll('.day-cell:not(.empty)').forEach(bindCell);
  }

  /* ── Interactions ── */

  function onAdd() {
    const dk = this.dataset.dk;
    data[dk] = (data[dk] || 0) + 1;
    save();
    this.querySelector('.x-wrap').innerHTML = buildXMarks(dk, true);
    refreshTotals();
  }

  function onRemove(e) {
    e.preventDefault();
    const dk = this.dataset.dk;
    if (hrs(dk) > 0) {
      data[dk]--;
      if (!data[dk]) delete data[dk];
      save();
      this.querySelector('.x-wrap').innerHTML = buildXMarks(dk, false);
      refreshTotals();
    }
  }

  function refreshTotals() {
    let monthTotal = 0;
    document.querySelectorAll('.week-row').forEach((row, wi) => {
      let wt = 0;
      row.querySelectorAll('.day-cell:not(.empty)').forEach(cell => {
        wt += hrs(cell.dataset.dk);
      });
      const el = document.getElementById(`wt${wi}`);
      if (el) el.textContent = wt;
      monthTotal += wt;
    });
    document.getElementById('totalNum').textContent = monthTotal;
  }

  /* ── Boot ── */

  function init() {
    const now = new Date();
    yr = now.getFullYear();
    mo = now.getMonth();

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (--mo < 0) { mo = 11; yr--; }
      render();
    });
    document.getElementById('nextBtn').addEventListener('click', () => {
      if (++mo > 11) { mo = 0; yr++; }
      render();
    });

    const input   = document.getElementById('nameInput');
    const confirm = document.getElementById('confirmBtn');

    input.addEventListener('input', () => {
      confirm.disabled = input.value.trim().length === 0;
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !confirm.disabled) confirmName();
    });
    confirm.addEventListener('click', confirmName);

    // Render an empty calendar so layout is stable before cloud loads
    render();

    const saved = localStorage.getItem(USERNAME_KEY);
    if (saved) {
      initUser(saved);
    } else {
      showModal();
    }
  }

  init();
</script>
</body>
</html>
